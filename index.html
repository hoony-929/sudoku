<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="homeScreen" class="screen screen-home">
      <div class="hero-card">
        <p class="eyebrow">Minimal Sudoku</p>
        <h1>Sudoku</h1>
        <p class="hero-copy">데일리 도전이나 일반 모드로 바로 시작할 수 있는 9x9 스도쿠입니다.</p>
        <div class="hero-actions">
          <button id="dailyEntryBtn" class="primary-btn" type="button">데일리 도전</button>
          <button id="startEntryBtn" class="secondary-btn" type="button">START</button>
        </div>
      </div>
    </section>

    <section id="dailyScreen" class="screen hidden">
      <div class="panel-card">
        <div class="panel-head">
          <button id="dailyBackBtn" class="ghost-btn" type="button">뒤로</button>
          <div>
            <p class="eyebrow">Daily Challenge</p>
            <h2 id="dailyTitle">2026년 3월</h2>
          </div>
        </div>
        <p class="panel-copy">2026년 1월부터 오늘인 3월 11일까지 선택할 수 있습니다. 미래 날짜는 잠겨 있습니다.</p>
        <div id="monthTabs" class="month-tabs" aria-label="월 선택"></div>
        <div class="calendar-weekdays">
          <span>일</span>
          <span>월</span>
          <span>화</span>
          <span>수</span>
          <span>목</span>
          <span>금</span>
          <span>토</span>
        </div>
        <div id="calendarGrid" class="calendar-grid" aria-label="달력"></div>
        <div class="daily-footer">
          <div id="dailySelectionText" class="selection-text"></div>
          <button id="dailyStartBtn" class="primary-btn" type="button">선택한 날짜로 시작</button>
        </div>
      </div>
    </section>

    <section id="difficultyScreen" class="screen hidden">
      <div class="panel-card">
        <div class="panel-head">
          <button id="difficultyBackBtn" class="ghost-btn" type="button">뒤로</button>
          <div>
            <p class="eyebrow">Classic Mode</p>
            <h2>난이도 선택</h2>
          </div>
        </div>
        <div class="difficulty-grid">
          <button class="difficulty-btn" data-difficulty="easy" type="button">
            <strong>하</strong>
            <span>가볍게 시작하는 퍼즐</span>
          </button>
          <button class="difficulty-btn" data-difficulty="medium" type="button">
            <strong>중</strong>
            <span>생각할 거리가 있는 퍼즐</span>
          </button>
          <button class="difficulty-btn" data-difficulty="hard" type="button">
            <strong>상</strong>
            <span>집중해서 푸는 퍼즐</span>
          </button>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen hidden">
      <div class="game-panel">
        <div class="topbar">
          <div>
            <div id="gameBadge" class="game-badge"></div>
            <h2 id="gameTitle">Sudoku</h2>
          </div>
          <button id="homeBtn" class="ghost-btn" type="button">처음으로</button>
        </div>

        <div class="meta-row">
          <div id="status" class="status">칸을 선택하세요.</div>
          <div id="hintMeta" class="hint-meta">힌트 3회 남음</div>
        </div>

        <div id="board" class="board" aria-label="스도쿠 보드"></div>

        <div class="controls">
          <div class="action-buttons">
            <button id="undoBtn" type="button">실행 취소</button>
            <button id="eraseBtn" type="button">지우개</button>
            <button id="noteBtn" type="button">노트</button>
            <button id="hintBtn" type="button">힌트 <span id="hintCount">3</span></button>
          </div>
          <div id="numberPad" class="number-pad" aria-label="숫자 버튼"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="completeOverlay" class="complete-overlay hidden" aria-hidden="true">
    <div class="complete-card">
      <div class="checkmark-wrap">
        <div class="checkmark-circle"></div>
        <div class="checkmark-stem"></div>
        <div class="checkmark-kick"></div>
      </div>
      <h3>완료!</h3>
      <p>모든 숫자를 채워 퍼즐을 해결했습니다.</p>
      <button id="completeHomeBtn" class="primary-btn" type="button">처음으로</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
