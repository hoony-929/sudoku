<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="homeScreen" class="screen screen-home">
      <div class="hero-card">
        <div class="home-top-actions">
          <button id="homeHelpBtn" class="secondary-btn" type="button"></button>
          <button id="homeSettingsBtn" class="icon-btn" type="button" aria-label="Settings">&#9881;</button>
        </div>
        <div class="hero-layout">
          <div class="hero-copy-wrap">
            <p id="homeEyebrow" class="eyebrow"></p>
            <h1 id="homeTitle"></h1>
            <p id="homeCopy" class="hero-copy"></p>
            <div class="hero-actions">
              <button id="dailyEntryBtn" class="primary-btn" type="button"></button>
              <button id="startEntryBtn" class="secondary-btn" type="button"></button>
            </div>
          </div>
          <div class="hero-preview" aria-hidden="true">
            <div class="preview-glow preview-glow-a"></div>
            <div class="preview-glow preview-glow-b"></div>
            <div id="heroPreviewBoard" class="preview-board"></div>
          </div>
        </div>
      </div>
      <section id="homeAdSection" class="ad-card hidden" aria-label="Advertisement">
        <div id="homeAdLabel" class="ad-label">Advertisement</div>
        <div class="ad-slot-wrap">
          <ins id="homeAdSlot" class="adsbygoogle ad-slot"
            style="display:block"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
        </div>
      </section>
    </section>

    <section id="dailyScreen" class="screen hidden">
      <div class="panel-card">
        <div class="panel-head">
          <button id="dailyBackBtn" class="ghost-btn" type="button"></button>
          <div>
            <p id="dailyEyebrow" class="eyebrow"></p>
            <h2 id="dailyTitle"></h2>
          </div>
        </div>
        <p id="dailyCopy" class="panel-copy"></p>
        <div id="monthTabs" class="month-tabs" aria-label="Month tabs"></div>
        <div id="weekdayRow" class="calendar-weekdays"></div>
        <div id="calendarGrid" class="calendar-grid" aria-label="Calendar"></div>
        <div class="daily-footer">
          <div id="dailySelectionText" class="selection-text"></div>
          <button id="dailyStartBtn" class="primary-btn" type="button"></button>
        </div>
      </div>
    </section>

    <section id="difficultyScreen" class="screen hidden">
      <div class="panel-card">
        <div class="panel-head">
          <button id="difficultyBackBtn" class="ghost-btn" type="button"></button>
          <div>
            <p id="difficultyEyebrow" class="eyebrow"></p>
            <h2 id="difficultyTitle"></h2>
          </div>
        </div>
        <div class="difficulty-grid">
          <button class="difficulty-btn" data-difficulty="easy" type="button">
            <strong id="difficultyEasyLabel"></strong>
            <span id="difficultyEasyCopy"></span>
          </button>
          <button class="difficulty-btn" data-difficulty="medium" type="button">
            <strong id="difficultyMediumLabel"></strong>
            <span id="difficultyMediumCopy"></span>
          </button>
          <button class="difficulty-btn" data-difficulty="hard" type="button">
            <strong id="difficultyHardLabel"></strong>
            <span id="difficultyHardCopy"></span>
          </button>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen screen-game hidden">
      <div class="game-panel">
        <div class="topbar topbar-game">
          <div>
            <div id="gameBadge" class="game-badge"></div>
            <h2 id="gameTitle"></h2>
          </div>
          <div id="mistakeMeta" class="mistake-meta"></div>
          <div class="game-header-actions">
            <button id="gameHelpBtn" class="icon-btn" type="button" aria-label="Help">?</button>
            <button id="gameSettingsBtn" class="icon-btn" type="button" aria-label="Settings">&#9881;</button>
          </div>
        </div>
        <div class="meta-row meta-row-game">
          <div id="timerMeta" class="meta-pill"></div>
          <div id="hintMeta" class="meta-pill"></div>
        </div>
        <div id="gameLayout" class="game-layout">
          <div class="board-column">
            <div id="board" class="board" aria-label="Sudoku board"></div>
            <div class="controls">
              <div class="action-buttons">
                <button id="undoBtn" type="button"></button>
                <button id="eraseBtn" type="button"></button>
                <button id="noteBtn" type="button"></button>
                <button id="hintBtn" type="button"><span id="hintBtnLabel"></span> <span id="hintCount">3</span></button>
              </div>
              <div id="numberPad" class="number-pad" aria-label="Number pad"></div>
            </div>
          </div>
          <aside id="gameHelpPanel" class="game-help-panel hidden" aria-live="polite">
            <div class="help-panel-head">
              <h3 id="gameHelpPanelTitle"></h3>
              <button id="gameHelpCloseBtn" class="icon-btn small" type="button" aria-label="Close">X</button>
            </div>
            <div id="gameHelpPanelBody" class="help-body"></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div id="completeOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="complete-card modal-card">
      <div class="checkmark-wrap">
        <div class="checkmark-circle"></div>
        <div class="checkmark-stem"></div>
        <div class="checkmark-kick"></div>
      </div>
      <h3 id="completeTitle"></h3>
      <p id="completeCopy"></p>
      <button id="completeHomeBtn" class="primary-btn" type="button"></button>
    </div>
  </div>

  <div id="settingsOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card settings-card">
      <div class="modal-head">
        <h3 id="settingsTitle"></h3>
        <button id="settingsCloseBtn" class="icon-btn small" type="button" aria-label="Close">X</button>
      </div>
      <p id="settingsCopy" class="modal-copy"></p>
      <div class="settings-section">
        <div id="settingsLanguageTitle" class="settings-label"></div>
        <div class="language-grid">
          <button class="language-btn" data-lang="ko" type="button">한국어</button>
          <button class="language-btn" data-lang="en" type="button">English</button>
          <button class="language-btn" data-lang="ja" type="button">日本語</button>
          <button class="language-btn" data-lang="zh" type="button">中文</button>
        </div>
      </div>
      <div id="settingsHomeWrap" class="settings-home-wrap hidden">
        <button id="settingsHomeBtn" class="secondary-btn block-btn" type="button"></button>
      </div>
    </div>
  </div>

  <div id="confirmOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card confirm-card">
      <h3 id="confirmTitle"></h3>
      <p id="confirmCopy" class="modal-copy"></p>
      <div class="confirm-actions">
        <button id="confirmCancelBtn" class="secondary-btn" type="button"></button>
        <button id="confirmConfirmBtn" class="primary-btn" type="button"></button>
      </div>
    </div>
  </div>

  <div id="helpOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card help-card">
      <div class="modal-head">
        <h3 id="helpModalTitle"></h3>
        <button id="helpCloseBtn" class="icon-btn small" type="button" aria-label="Close">X</button>
      </div>
      <div id="helpModalBody" class="help-body"></div>
    </div>
  </div>

  <div id="failOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card confirm-card">
      <h3 id="failTitle"></h3>
      <p id="failCopy" class="modal-copy"></p>
      <div class="confirm-actions">
        <button id="failRetryBtn" class="primary-btn" type="button"></button>
        <button id="failBackBtn" class="secondary-btn" type="button"></button>
      </div>
    </div>
  </div>
  <script src="./ads-config.js"></script>
  <script src="./ads.js"></script>
  <script src="./app.js"></script>
</body>
</html>
